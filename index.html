<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c2c2c">
  <title>Kibitz</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <!-- CAMERA state -->
    <div id="state-camera" class="state active">
      <video id="camera-feed" autoplay playsinline></video>
      <!-- Guide overlay: corner brackets to help frame the board -->
      <div class="guide-overlay" id="guide-overlay">
        <div class="guide-corner tl"></div>
        <div class="guide-corner tr"></div>
        <div class="guide-corner bl"></div>
        <div class="guide-corner br"></div>
      </div>
      <div class="camera-controls">
        <button class="side-toggle" id="side-toggle">White</button>
        <button class="capture-btn" id="capture-btn" aria-label="Capture" disabled>
          <span class="capture-loading" id="capture-loading"></span>
        </button>
      </div>
    </div>

    <!-- ANALYZING state -->
    <div id="state-analyzing" class="state">
      <canvas id="frozen-frame"></canvas>
      <div class="analyzing-overlay">
        <div class="spinner"></div>
        <p>Reading the board...</p>
      </div>
    </div>

    <!-- PHOTO+ARROWS state -->
    <div id="state-photo" class="state">
      <canvas id="photo-canvas"></canvas>
      <div class="eval-bar"><div class="eval-bar-fill"></div></div>
      <div class="photo-controls">
        <p class="fen-display" id="fen-display"></p>
        <button class="btn btn-secondary" id="new-capture-photo">New capture</button>
      </div>
    </div>

    <!-- BOARD state -->
    <div id="state-board" class="state">
      <div id="board-container"></div>
      <div class="board-controls">
        <button class="btn btn-primary" id="analyze-deeper">Analyze deeper</button>
        <button class="btn btn-secondary" id="back-to-photo">Back</button>
        <button class="btn btn-secondary" id="new-capture-board">New capture</button>
      </div>
    </div>

    <!-- Permission denied / errors -->
    <div id="state-error" class="state">
      <div class="message error" id="error-message"></div>
    </div>
  </div>

  <footer class="footer">
    Made with care by <a href="https://william.revah.paris">William</a>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
