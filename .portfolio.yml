name: Kibitz
tagline: "Your phone sees the board. You see the best move."
description: >
  Chess position recognition PWA. Point your phone at a chessboard, tap,
  and see the best move overlaid on the photo as arrows. Flip to an interactive
  board to explore the engine's suggested line. Custom neural network trained
  on synthetic data, running entirely in-browser.
